listings:
  - name: Dandelion — events near London
    url: "https://dandelion.events/events?display=&order=&from=&to=&q=&near=London%2C+UK&event_tag_id=&search=1"
    tags: [community, dance, workshop]
    # co-created events platform, strong for circling/AR/embodiment/conscious community
    # The HTML listing 403s robots, but the public ICS feed works and is the best index:
    #   https://dandelion.events/events.ics?near=London%2C+UK
    # Fetch that, shortlist by title/interest, then verify each /e/ page. Do NOT bulk-import
    # the feed — it lists everything near London and needs judgment against preferences.md.
  - name: 5Rhythms — GB class search
    url: "https://www.5rhythms.com/EventSearch.php?validate_event_level=&event_type_id=1&event_country=GB&event_state=&event_city%5B%5D=&event_days%5B%5D=&event_startDate=mm%2Fdd%2Fyy&event_endDate=mm%2Fdd%2Fyy&location_lat=&location_long=&findIt=FIND+IT&isAdvancedSearch=0&SearchName=&SearchEvent=&event_level_id%5B%5D="
    tags: [dance]
    # IMPORTANT: search covers all of Great Britain — only add events located in London
  - name: Thursday — London dating events
    url: https://www.thursday.com/events/london
    tags: [community]
  - name: Ceroc — find classes
    url: https://www.ceroc.com/find-a-class/
    tags: [dance, class]
    # prefer east/central London venues
  - name: LessWrong community events
    url: https://www.lesswrong.com/community
    tags: [talk, community]
    # filter to London events only
  - name: Time Out London – things to do this week
    url: https://www.timeout.com/london/things-to-do/things-to-do-in-london-this-weekend
    tags: []
  - name: Eventbrite – classes in London
    url: https://www.eventbrite.co.uk/d/united-kingdom--london/classes/
    tags: [class]
  - name: Meetup – events in London
    url: https://www.meetup.com/find/?location=gb--london&source=EVENTS
    tags: [community]

